<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NOT GPT</title>
    <meta
      name="description"
      content="NOT GPT questions sources, repetition, incentives and uncertainty before showing you an answer."
    />
    <style>
      :root {
        --blue: #0757e6;
        --blue-2: #0d63f3;
        --navy: #07143d;
        --text: #162242;
        --muted: #6b748b;
        --line: #c8d8f7;
        --line-2: #dbe7fb;
        --soft: #edf5ff;
        --paper: #ffffff;
        --glow: rgba(6, 84, 220, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--navy);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Arial, sans-serif;
        background:
          radial-gradient(circle at 50% 20%, #ffffff 0, #ffffff 34%, #f7fbff 68%, #eef6ff 100%);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        position: fixed;
        top: 138px;
        z-index: -1;
        width: 560px;
        height: 420px;
        content: "";
        opacity: 0.62;
        background-image: repeating-radial-gradient(
          ellipse at center,
          transparent 0 15px,
          rgba(6, 90, 230, 0.18) 16px 17px,
          transparent 18px 31px
        );
        pointer-events: none;
      }

      body::before {
        left: -255px;
        transform: rotate(13deg);
      }

      body::after {
        right: -210px;
        transform: rotate(-10deg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      :focus-visible {
        outline: 3px solid rgba(7, 87, 230, 0.35);
        outline-offset: 3px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .shell {
        width: min(1720px, calc(100% - 140px));
        margin: 0 auto;
      }

      .topbar {
        height: 88px;
        border-bottom: 1px solid #d6e1f4;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(18px);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 88px;
        gap: 32px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 13px;
        color: var(--navy);
        font-size: 39px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .logo-icon {
        width: 55px;
        height: 55px;
        color: var(--blue);
        flex: 0 0 auto;
      }

      .nav-links {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: clamp(34px, 4vw, 64px);
        margin-left: 34px;
        color: var(--navy);
        font-size: 20px;
        font-weight: 650;
      }

      .nav-links a {
        position: relative;
        padding: 32px 0 29px;
      }

      .nav-links a.active {
        color: var(--blue);
        font-weight: 800;
      }

      .nav-links a.active::after {
        position: absolute;
        left: -2px;
        right: -2px;
        bottom: 20px;
        height: 3px;
        border-radius: 999px;
        background: var(--blue);
        content: "";
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .nav-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        border-radius: 9px;
        padding: 0 28px;
        font-size: 20px;
        font-weight: 700;
      }

      .nav-button.secondary {
        border: 1.5px solid #6c7898;
        background: #fff;
        color: var(--navy);
      }

      .nav-button.primary {
        border: 1.5px solid var(--blue);
        background: var(--blue);
        color: #fff;
        box-shadow: 0 9px 18px rgba(7, 87, 230, 0.18);
      }

      main {
        padding: 20px 0 14px;
      }

      .hero {
        display: flex;
        min-height: calc(100vh - 122px);
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      h1 {
        max-width: 1070px;
        margin: 0 auto;
        color: var(--navy);
        font-size: clamp(48px, 4.95vw, 77px);
        font-weight: 930;
        line-height: 1.05;
        letter-spacing: -0.055em;
      }

      .blue-line {
        display: block;
        color: var(--blue);
        font-size: clamp(46px, 4.3vw, 63px);
        line-height: 1.05;
        letter-spacing: -0.045em;
      }

      .subhead {
        max-width: 720px;
        margin: 8px auto 22px;
        color: #303a56;
        font-size: 23px;
        line-height: 1.25;
        letter-spacing: 0.01em;
      }

      .search-wrap {
        max-width: 1026px;
        margin: 0 auto;
      }

      .search-bar {
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr) auto;
        align-items: center;
        min-height: 90px;
        border: 1.8px solid var(--blue);
        border-radius: 13px;
        background: var(--paper);
        box-shadow: 0 18px 38px rgba(7, 87, 230, 0.08);
        padding: 0 21px;
      }

      .search-icon {
        color: #8d97ad;
        width: 30px;
        height: 30px;
      }

      .question {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--navy);
        font-size: 23px;
        background: transparent;
      }

      .question::placeholder {
        color: #767f96;
      }

      .search-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 13px;
        min-height: 55px;
        border: 0;
        border-radius: 9px;
        background: var(--blue);
        color: #fff;
        padding: 0 28px;
        font-size: 20px;
        font-weight: 830;
        white-space: nowrap;
        box-shadow: 0 10px 18px rgba(7, 87, 230, 0.19);
      }

      .search-button svg {
        width: 30px;
        height: 30px;
      }

      .icon-disc {
        display: grid;
        width: 70px;
        height: 70px;
        place-items: center;
        border-radius: 999px;
        background: radial-gradient(circle at 35% 30%, #f8fbff, #dfeeff);
        color: #084fbf;
      }

      .icon-disc svg {
        width: 43px;
        height: 43px;
        stroke-width: 1.8;
      }

      @media (max-width: 1280px) {
        .shell {
          width: min(100% - 44px, 1180px);
        }

        .nav-links {
          gap: 28px;
        }

      }

      @media (max-width: 880px) {
        .topbar,
        .nav {
          height: auto;
        }

        .nav {
          align-items: flex-start;
          flex-direction: column;
          padding: 18px 0;
        }

        .nav-links {
          order: 3;
          flex-wrap: wrap;
          justify-content: flex-start;
          margin-left: 0;
        }

        .nav-links a {
          padding: 8px 0;
        }

        .nav-links a.active::after {
          bottom: 3px;
        }

        .nav-actions {
          width: 100%;
        }

        .search-bar {
          grid-template-columns: 38px 1fr;
          gap: 8px;
          padding: 16px;
        }

        .search-button {
          grid-column: 1 / -1;
          width: 100%;
        }

        .keys {
          flex-wrap: wrap;
        }

      }

      @media (max-width: 560px) {
        .shell {
          width: min(100% - 24px, 1180px);
        }

        .brand {
          font-size: 32px;
        }

        .nav-actions {
          flex-direction: column;
        }

        .nav-button {
          width: 100%;
        }

        h1 {
          font-size: 42px;
        }

        .blue-line {
          font-size: 38px;
        }

        .subhead {
          font-size: 19px;
        }

        .icon-disc {
          width: 60px;
          height: 60px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="shell nav">
        <a class="brand" href="/Not-GPT/" aria-label="NOT GPT home">
          <svg class="logo-icon" viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="27" cy="27" r="19" fill="none" stroke="currentColor" stroke-width="8" />
            <path d="M42 42 58 58" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="8" />
          </svg>
          <span>NOT GPT</span>
        </a>

        <nav class="nav-links" aria-label="Primary navigation">
          <a class="active" href="/Not-GPT/">Search</a>
          <a href="/Not-GPT/why-not-gpt.html">Why NOT GPT</a>
        </nav>

        <div class="nav-actions">
          <a class="nav-button secondary" href="#signin" aria-label="Sign in coming soon">COMING SOON</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero shell" aria-labelledby="headline">
        <h1 id="headline">
          AI converts the commercially engineered internet into answers.
          <span class="blue-line">NOT GPT doesn&rsquo;t.</span>
        </h1>
        <p class="subhead">
          NOT GPT questions the sources, repetition, incentives and uncertainty<br />
          before showing you an answer.
        </p>

        <form class="search-wrap" id="searchForm" action="#try">
          <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="14" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="3" />
              <path d="m21 21 7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3" />
            </svg>
            <label class="sr-only" for="question">Ask something important</label>
            <input id="question" class="question" type="text" placeholder="Ask something important..." />
            <button class="search-button" type="submit">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <circle cx="14" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="m21 21 7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3" />
              </svg>
              Search with NOT GPT
            </button>
          </div>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("searchForm");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const button = form.querySelector(".search-button");
        button.textContent = "Demo search ready";
        window.setTimeout(() => {
          button.innerHTML = `
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="14" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="3"></circle>
              <path d="m21 21 7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3"></path>
            </svg>
            Search with NOT GPT
          `;
        }, 1400);
      });

    </script>
  </body>
</html>
